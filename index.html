<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Letras & Reflexiones | Blog Literario</title>
    
    <meta name="description" content="Un espacio de exploración literaria, reflexiones y pensamientos que despiertan la curiosidad.">
    <meta name="robots" content="index, follow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ============================================
           VARIABLES Y RESET
           ============================================ */
        :root {
            --color-cream: #fefdfd;
            --color-beige: #d0c8ba;
            --color-sage: #85937e;
            --color-brown: #5f4332;
            --color-white: #ffffff;
            --color-error: #c45c4a;
            --color-success: #4a8c5c;
            
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', system-ui, sans-serif;
            
            --radius: 12px;
            --shadow: 0 4px 20px rgba(95, 67, 50, 0.1);
            --shadow-hover: 0 8px 30px rgba(95, 67, 50, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--color-cream);
            color: var(--color-brown);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================
           UTILIDADES
           ============================================ */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .flex-wrap { flex-wrap: wrap; }
        
        .font-serif { font-family: var(--font-serif); }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 2rem; }
        .text-4xl { font-size: 2.5rem; }
        
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mt-auto { margin-top: auto; }
        
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-12 { padding-top: 3rem; padding-bottom: 3rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        
        .rounded { border-radius: var(--radius); }
        .rounded-full { border-radius: 9999px; }
        
        /* ============================================
           BOTONES (Corregido z-index y cursor)
           ============================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
            z-index: 10; /* Asegura que estén por encima de fondos */
            user-select: none;
        }
        
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-primary {
            background-color: var(--color-sage);
            color: var(--color-cream);
            border-color: var(--color-sage);
        }
        .btn-primary:hover:not(:disabled) { background-color: #75836e; transform: translateY(-1px); }
        
        .btn-secondary {
            background-color: var(--color-cream);
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        .btn-secondary:hover:not(:disabled) { background-color: var(--color-beige); }
        
        .btn-outline {
            background-color: transparent;
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        .btn-outline:hover:not(:disabled) {
            background-color: rgba(208, 200, 186, 0.2);
            border-color: var(--color-sage);
        }
        
        .btn-ghost {
            background-color: transparent;
            color: var(--color-brown);
            border-color: transparent;
        }
        .btn-ghost:hover:not(:disabled) { background-color: rgba(208, 200, 186, 0.2); }
        
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        .btn-lg { padding: 1rem 2rem; font-size: 1rem; font-weight: 600; }
        
        .btn-icon { padding: 0.5rem; width: 36px; height: 36px; }
        .btn-error { background-color: var(--color-error); color: white; border-color: var(--color-error); }
        
        /* ============================================
           FORMULARIOS
           ============================================ */
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.375rem; font-size: 0.875rem; font-weight: 500; color: var(--color-brown); }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--color-brown);
            background-color: var(--color-cream);
            border: 1px solid var(--color-beige);
            border-radius: var(--radius);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-input:focus { outline: none; border-color: var(--color-sage); box-shadow: 0 0 0 3px rgba(133, 147, 126, 0.2); }
        .form-input::placeholder { color: rgba(95, 67, 50, 0.5); }
        textarea.form-input { min-height: 120px; resize: vertical; }
        select.form-input { cursor: pointer; }
        .form-helper { margin-top: 0.25rem; font-size: 0.75rem; color: rgba(95, 67, 50, 0.6); }
        
        .file-input-wrapper { position: relative; display: flex; flex-direction: column; gap: 0.5rem; }
        .file-input { display: none; }
        .file-input-label {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 1rem; border: 2px dashed var(--color-beige); border-radius: var(--radius);
            cursor: pointer; transition: all 0.2s ease; text-align: center;
        }
        .file-input-label:hover { border-color: var(--color-sage); background-color: rgba(133, 147, 126, 0.05); }
        .file-preview { max-width: 200px; max-height: 200px; border-radius: var(--radius); object-fit: cover; }
        
        /* ============================================
           HEADER (LOGO ARREGLADO Y PROLIJO)
           ============================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--color-cream);
            border-bottom: 1px solid var(--color-beige);
            box-shadow: 0 2px 10px rgba(95, 67, 50, 0.05);
        }
        
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Más espacio vertical para que no se vea apretado */
            padding: 1rem 1.5rem; 
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            /* Más separación entre imagen y texto */
            gap: 1rem; 
            cursor: pointer;
            text-decoration: none;
            /* Borde sutil y padding interno para que se vea "prolijo" */
            padding: 0.5rem 1rem;
            border-radius: 50px;
            transition: background-color 0.2s ease;
        }
        
        .logo:hover {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .logo-img {
            /* Tamaño equilibrado pero visible */
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--color-sage);
            box-shadow: 0 4px 12px rgba(133, 147, 126, 0.25);
            border: 2px solid var(--color-cream);
            transition: transform 0.3s ease;
        }
        
        .logo:hover .logo-img { transform: scale(1.05); }
        
        .logo-text {
            font-family: var(--font-serif);
            font-size: 1.5rem; /* Texto más grande y legible */
            font-weight: 700;
            color: var(--color-brown);
            letter-spacing: -0.02em;
            white-space: nowrap; /* Evita que el texto se rompa feo */
        }
        
        .header-actions { display: flex; align-items: center; gap: 0.75rem; }
        
        .search-wrapper { position: relative; }
        .search-input { padding-left: 2.25rem; width: 200px; }
        .search-icon {
            position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; color: var(--color-sage);
        }
        
        .user-menu { display: flex; align-items: center; gap: 0.75rem; }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%; background-color: var(--color-sage);
            color: var(--color-cream); display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.9rem;
        }
        
        .mobile-menu-btn { display: none; }
        
        @media (max-width: 768px) {
            .header-actions.desktop { display: none; }
            .mobile-menu-btn { display: flex; }
            .mobile-menu {
                display: none; padding: 1.5rem; border-top: 1px solid var(--color-beige);
                background: var(--color-cream);
            }
            .mobile-menu.open { display: block; }
            .mobile-menu .form-input, .mobile-menu .btn { width: 100%; margin-bottom: 0.5rem; }
            .mobile-menu .user-menu { flex-direction: column; align-items: stretch; }
            .logo-text { font-size: 1.2rem; }
            .logo-img { width: 45px; height: 45px; }
        }
        
        /* ============================================
           HERO SECTION (LOGO CENTRAL GIGANTE)
           ============================================ */
        .hero { position: relative; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; z-index: 0; }
        .hero-bg img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(95, 67, 50, 0.85) 0%, rgba(133, 147, 126, 0.75) 50%, rgba(95, 67, 50, 0.65) 100%);
        }
        
        .hero-content {
            position: relative; z-index: 20; /* Z-index alto para asegurar clicks */
            padding: 5rem 1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* LOGO CENTRAL AHORA MUY GRANDE */
        .hero-logo {
            width: 220px;  /* Antes 140px, ahora mucho más grande */
            height: 220px;
            margin: 0 auto 2.5rem;
            border-radius: 50%;
            background-color: rgba(254, 253, 253, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border: 4px solid rgba(254, 253, 253, 0.4);
            animation: float 6s ease-in-out infinite;
        }
        
        .hero-logo img {
            width: 200px; /* Casi llena el contenedor */
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .hero h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-cream);
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .hero p {
            font-size: 1.2rem;
            color: rgba(254, 253, 253, 0.95);
            max-width: 700px;
            margin: 0 auto 2.5rem;
            line-height: 1.7;
        }
        
        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
            position: relative;
            z-index: 30; /* Asegura que los botones sean clickeables */
        }
        
        .hero-wave {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
        }
        .hero-wave svg { display: block; width: 100%; height: auto; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        
        @media (min-width: 768px) {
            .hero-content { padding: 8rem 1rem; }
            .hero h1 { font-size: 3.5rem; }
            .hero p { font-size: 1.35rem; }
        }
        
        /* ============================================
           NEWSLETTER & PUBLICACIONES
           ============================================ */
        .newsletter-section {
            background-color: rgba(208, 200, 186, 0.25);
            padding: 4rem 1rem;
            text-align: center;
        }
        .newsletter-section h2 { font-family: var(--font-serif); font-size: 2rem; color: var(--color-brown); margin-bottom: 1rem; }
        .newsletter-section p { color: rgba(95, 67, 50, 0.8); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        
        .newsletter-form {
            display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;
            max-width: 500px; margin: 0 auto;
        }
        .newsletter-form .form-input { flex: 1; min-width: 250px; }
        
        .publications-section { padding: 4rem 1rem; }
        .publications-section h2 { font-family: var(--font-serif); font-size: 2rem; color: var(--color-brown); text-align: center; margin-bottom: 2rem; }
        
        .category-filters { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-bottom: 2.5rem; }
        .category-btn {
            padding: 0.5rem 1.25rem; font-size: 0.9rem; background-color: transparent;
            color: var(--color-brown); border: 1px solid var(--color-beige);
            border-radius: 50px; cursor: pointer; transition: all 0.2s ease;
        }
        .category-btn:hover { background-color: rgba(208, 200, 186, 0.3); }
        .category-btn.active { background-color: var(--color-sage); color: var(--color-cream); border-color: var(--color-sage); }
        
        .publications-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .publications-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .publication-card {
            background-color: var(--color-cream); border-radius: var(--radius);
            overflow: hidden; box-shadow: var(--shadow); cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column;
        }
        .publication-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
        
        .publication-image {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        
        .publication-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .publication-category {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.4rem 1rem;
            background-color: var(--color-sage);
            color: var(--color-cream);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            z-index: 10;
        }
        
        .publication-content {
            padding: 1.5rem; /* Le damos aire al texto */
        }
        
        .publication-title {
            /* Quitamos el absolute para que no se encime */
            position: relative; 
            font-family: var(--font-serif);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-brown);
            margin-bottom: 0.8rem;
            line-height: 1.2; /* Para que no se vea raro si tiene dos renglones */
        }
        
        .publication-excerpt {
            font-size: 0.95rem;
            color: rgba(95, 67, 50, 0.8);
            line-height: 1.5;
        }
                
        .publication-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: var(--color-sage); border-top: 1px solid var(--color-beige); padding-top: 1rem; }
        .publication-author { display: flex; align-items: center; gap: 0.5rem; }
        .publication-author-avatar {
            width: 28px; height: 28px; border-radius: 50%; background-color: var(--color-beige);
            color: var(--color-brown); display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
        }
        .publication-info { display: flex; align-items: center; gap: 1rem; }
        
        .empty-state { text-align: center; padding: 4rem; color: rgba(95, 67, 50, 0.6); font-size: 1.1rem; }
        
        /* ============================================
           DETALLE PUBLICACIÓN & FOOTER
           ============================================ */
        .publication-detail { flex: 1; }
        .publication-detail-header { position: relative; height: 300px; overflow: hidden; }
        @media (min-width: 768px) { .publication-detail-header { height: 400px; } }
        .publication-detail-header img { width: 100%; height: 100%; object-fit: cover; }
        .publication-detail-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(95, 67, 50, 1), transparent); }
        .publication-detail-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem; }
        .publication-detail-content { max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem; }
        .publication-detail-content p { font-family: var(--font-serif); font-size: 1.2rem; line-height: 1.9; color: var(--color-brown); margin-bottom: 2rem; }
        .publication-actions { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--color-beige); }
        
        .author-card {
            margin-top: 3rem; padding: 2rem; background-color: rgba(208, 200, 186, 0.2);
            border-radius: var(--radius); display: flex; align-items: center; gap: 1.5rem;
        }
        .author-card-avatar {
            width: 80px; height: 80px; border-radius: 50%; background-color: var(--color-sage);
            color: var(--color-cream); display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 700; flex-shrink: 0;
        }
        .author-card h3 { font-family: var(--font-serif); font-size: 1.3rem; color: var(--color-brown); margin-bottom: 0.25rem; }
        .author-card p { font-family: var(--font-sans); font-size: 0.95rem; color: rgba(95, 67, 50, 0.7); margin: 0; }
        
        .footer { background-color: var(--color-brown); color: var(--color-cream); padding: 3rem 1rem; margin-top: auto; }
        .footer-grid { display: grid; grid-template-columns: 1fr; gap: 2.5rem; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { .footer-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .footer-brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
        .footer-brand img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .footer-brand span { font-family: var(--font-serif); font-weight: 700; font-size: 1.2rem; }
        .footer p { color: rgba(254, 253, 253, 0.7); font-size: 0.95rem; line-height: 1.7; }
        .footer h4 { font-family: var(--font-serif); font-weight: 700; margin-bottom: 1.25rem; font-size: 1.1rem; }
        .footer ul { list-style: none; }
        .footer li { margin-bottom: 0.75rem; }
        .footer button {
            color: rgba(254, 253, 253, 0.7); font-size: 0.95rem; background: none; border: none;
            cursor: pointer; padding: 0; transition: color 0.2s ease; text-align: left;
        }
        .footer button:hover { color: var(--color-cream); text-decoration: underline; }
        .footer-divider { margin: 2rem 0; border: none; border-top: 1px solid rgba(254, 253, 253, 0.15); }
        .footer-copyright { text-align: center; font-size: 0.85rem; color: rgba(254, 253, 253, 0.5); }
        
        /* ============================================
           MODAL & ADMIN
           ============================================ */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 2000; background-color: rgba(95, 67, 50, 0.6);
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { opacity: 1; visibility: visible; }
        .modal {
            background-color: var(--color-cream); 
            border-radius: var(--radius);
            max-width: 600px; /* 👈 Lo subimos de 500px a 600px para que el texto no esté tan apretado */
            width: 95%;       /* 👈 Asegura que en móviles se vea bien */
            max-height: 90vh; 
            overflow-y: auto;
            transform: scale(0.9); 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative; /* 👈 Añadimos esto por seguridad */
        }
        .modal-overlay.open .modal { transform: scale(1); }
        .modal-header { padding: 2rem; border-bottom: 1px solid var(--color-beige); text-align: center; }
        .modal-header h2 { font-family: var(--font-serif); font-size: 1.8rem; color: var(--color-brown); }
        .modal-header p { color: rgba(95, 67, 50, 0.7); font-size: 0.95rem; margin-top: 0.5rem; }
        .modal-body { padding: 2rem; }
        .modal-footer { padding: 1.5rem 2rem; border-top: 1px solid var(--color-beige); text-align: center; background: rgba(208, 200, 186, 0.1); }
        .modal-footer p { font-size: 0.9rem; color: rgba(95, 67, 50, 0.7); }
        .modal-footer button { color: var(--color-sage); font-weight: 600; background: none; border: none; cursor: pointer; }
        .modal-footer button:hover { text-decoration: underline; }
        .modal-icon {
            width: 70px; height: 70px; margin: 0 auto 1.5rem; border-radius: 50%;
            background-color: rgba(208, 200, 186, 0.3); display: flex; align-items: center;
            justify-content: center; color: var(--color-sage); font-size: 2rem;
        }
        
        .admin-panel { background-color: var(--color-cream); min-height: 100vh; }
        .admin-header { background-color: var(--color-brown); color: var(--color-cream); padding: 1.25rem; }
        .admin-header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .admin-header h1 { font-family: var(--font-serif); font-size: 1.4rem; }
        .admin-nav { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--color-beige); background-color: var(--color-white); overflow-x: auto; }
        .admin-nav-btn {
            padding: 1rem 1.5rem; font-size: 0.95rem; font-weight: 500; color: var(--color-brown);
            background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .admin-nav-btn:hover { background-color: rgba(208, 200, 186, 0.2); }
        .admin-nav-btn.active { color: var(--color-sage); border-bottom-color: var(--color-sage); }
        .admin-content { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
        .admin-card {
            background-color: var(--color-white); border-radius: var(--radius);
            border: 1px solid var(--color-beige); padding: 2rem; margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .admin-card h3 { font-family: var(--font-serif); font-size: 1.3rem; color: var(--color-brown); margin-bottom: 1.5rem; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--color-beige); }
        .admin-table th { font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: rgba(95, 67, 50, 0.6); }
        .admin-table td { font-size: 0.95rem; }
        .admin-table-img { width: 70px; height: 50px; object-fit: cover; border-radius: 6px; }
        .admin-table-actions { display: flex; gap: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card {
            background-color: var(--color-white); border-radius: var(--radius);
            border: 1px solid var(--color-beige); padding: 1.5rem; text-align: center;
        }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--color-sage); line-height: 1; margin-bottom: 0.5rem; }
        .stat-label { font-size: 0.8rem; color: rgba(95, 67, 50, 0.6); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .logo-upload-section { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; }
        .current-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--color-beige); box-shadow: var(--shadow); }
        .logo-upload-info h4 { font-size: 1.1rem; font-weight: 600; color: var(--color-brown); margin-bottom: 0.5rem; }
        .logo-upload-info p { font-size: 0.9rem; color: rgba(95, 67, 50, 0.7); margin-bottom: 1rem; }
        .hero-preview { width: 100%; max-width: 400px; height: auto; border-radius: var(--radius); margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        
        /* ============================================
           TOAST & LOADING
           ============================================ */
        .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 3000; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast {
            padding: 1rem 1.5rem; background-color: var(--color-brown); color: var(--color-cream);
            border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-size: 0.9rem; display: flex; align-items: center; gap: 0.75rem;
            animation: slideIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); max-width: 400px;
            border-left: 4px solid var(--color-sage);
        }
        .toast.success { background-color: var(--color-success); border-left-color: #3a704a; }
        .toast.error { background-color: var(--color-error); border-left-color: #a04a3a; }
        .toast.info { background-color: var(--color-sage); border-left-color: #6b7a65; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%) rotate(5deg); }
            to { opacity: 1; transform: translateX(0) rotate(0); }
        }
        
        .spinner {
            width: 24px; height: 24px; border: 3px solid transparent; border-top-color: currentColor;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-overlay {
            position: fixed; inset: 0; background-color: rgba(254, 253, 253, 0.95);
            display: flex; align-items: center; justify-content: center; z-index: 4000;
            backdrop-filter: blur(5px);
        }
        .loading-content { text-align: center; }
        .loading-content .spinner { width: 50px; height: 50px; border-width: 4px; border-top-color: var(--color-sage); margin: 0 auto 1.5rem; color: var(--color-brown); }
        .loading-content p { font-family: var(--font-serif); font-size: 1.2rem; color: var(--color-brown); }
        
        .icon { width: 1em; height: 1em; display: inline-block; vertical-align: middle; }
        .icon-sm { font-size: 16px; }
        .icon-md { font-size: 20px; }
        .icon-lg { font-size: 24px; }
    </style>
</head>
<body>
    <!-- Toast Container -->
     <div id="toast-container" class="toast-container"></div>
    
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Cargando...</p>
        </div>
    </div>
    
    <!-- Main App Container -->
    <main id="app"></main>
    
    <!-- Script principal -->
    <script src="main.js" defer></script>
</body>
</html>
