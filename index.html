<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Letras & Reflexiones | Blog Literario</title>
    
    <meta name="description" content="Un espacio de exploración literaria, reflexiones y pensamientos que despiertan la curiosidad.">
    <meta name="robots" content="index, follow">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ============================================
           VARIABLES Y RESET
           ============================================ */
        :root {
            --color-cream: #fefdfd;
            --color-beige: #d0c8ba;
            --color-sage: #85937e;
            --color-brown: #5f4332;
            --color-white: #ffffff;
            --color-error: #c45c4a;
            --color-success: #4a8c5c;
            
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', system-ui, sans-serif;
            
            --radius: 12px;
            --shadow: 0 4px 20px rgba(95, 67, 50, 0.1);
            --shadow-hover: 0 8px 30px rgba(95, 67, 50, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--color-cream);
            color: var(--color-brown);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================
           UTILIDADES
           ============================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .flex-wrap { flex-wrap: wrap; }
        
        .font-serif { font-family: var(--font-serif); }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 2rem; }
        .text-4xl { font-size: 2.5rem; }
        
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mt-auto { margin-top: auto; }
        
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-12 { padding-top: 3rem; padding-bottom: 3rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        
        .rounded { border-radius: var(--radius); }
        .rounded-full { border-radius: 9999px; }
        
        /* ============================================
           BOTONES
           ============================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background-color: var(--color-sage);
            color: var(--color-cream);
            border-color: var(--color-sage);
        }
        
        .btn-primary:hover:not(:disabled) {
            background-color: #75836e;
        }
        
        .btn-secondary {
            background-color: var(--color-cream);
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background-color: var(--color-beige);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        
        .btn-outline:hover:not(:disabled) {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .btn-ghost {
            background-color: transparent;
            color: var(--color-brown);
            border-color: transparent;
        }
        
        .btn-ghost:hover:not(:disabled) {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        
        .btn-lg {
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
        }
        
        .btn-icon {
            padding: 0.5rem;
            width: 36px;
            height: 36px;
        }
        
        .btn-error {
            background-color: var(--color-error);
            color: white;
            border-color: var(--color-error);
        }
        
        /* ============================================
           FORMULARIOS
           ============================================ */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-brown);
        }
        
        .form-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            color: var(--color-brown);
            background-color: var(--color-cream);
            border: 1px solid var(--color-beige);
            border-radius: var(--radius);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-sage);
            box-shadow: 0 0 0 3px rgba(133, 147, 126, 0.2);
        }
        
        .form-input::placeholder {
            color: rgba(95, 67, 50, 0.5);
        }
        
        textarea.form-input {
            min-height: 120px;
            resize: vertical;
        }
        
        select.form-input {
            cursor: pointer;
        }
        
        .form-helper {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: rgba(95, 67, 50, 0.6);
        }
        
        /* File input personalizado */
        .file-input-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .file-input {
            display: none;
        }
        
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border: 2px dashed var(--color-beige);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .file-input-label:hover {
            border-color: var(--color-sage);
            background-color: rgba(133, 147, 126, 0.05);
        }
        
        .file-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: var(--radius);
            object-fit: cover;
        }
        
        /* ============================================
           HEADER
           ============================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--color-cream);
            border-bottom: 1px solid var(--color-beige);
            box-shadow: 0 2px 10px rgba(95, 67, 50, 0.05);
        }
        
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            text-decoration: none;
        }
        
        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--color-sage);
            box-shadow: 0 3px 10px rgba(133, 147, 126, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .logo-img:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(133, 147, 126, 0.3);
        }
        
        .logo-text {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-brown);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .search-wrapper {
            position: relative;
        }
        
        .search-input {
            padding-left: 2.25rem;
            width: 180px;
        }
        
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--color-sage);
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--color-sage);
            color: var(--color-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .mobile-menu-btn {
            display: none;
        }
        
        /* Mobile menu */
        @media (max-width: 768px) {
            .header-actions.desktop {
                display: none;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
            
            .mobile-menu {
                display: none;
                padding: 1rem;
                border-top: 1px solid var(--color-beige);
            }
            
            .mobile-menu.open {
                display: block;
            }
            
            .mobile-menu .form-input,
            .mobile-menu .btn {
                width: 100%;
            }
            
            .mobile-menu .user-menu {
                flex-direction: column;
                align-items: stretch;
            }
        }
        
        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            position: relative;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        
        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(95, 67, 50, 0.9) 0%, 
                rgba(133, 147, 126, 0.8) 50%, 
                rgba(95, 67, 50, 0.7) 100%
            );
        }
        
        .hero-content {
            position: relative;
            z-index: 10;
            padding: 4rem 1rem;
            text-align: center;
        }
        
        .hero-logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background-color: rgba(254, 253, 253, 0.25);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(95, 67, 50, 0.3);
            border: 3px solid rgba(254, 253, 253, 0.3);
        }
        
        .hero-logo img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .hero h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-cream);
            margin-bottom: 1rem;
        }
        
        .hero p {
            font-size: 1.125rem;
            color: rgba(254, 253, 253, 0.9);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        
        .hero-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
        }
        
        .hero-wave svg {
            display: block;
            width: 100%;
            height: auto;
        }
        
        @media (min-width: 768px) {
            .hero-content {
                padding: 6rem 1rem;
            }
            
            .hero h1 {
                font-size: 3rem;
            }
            
            .hero p {
                font-size: 1.25rem;
            }
        }
        
        /* ============================================
           NEWSLETTER SECTION
           ============================================ */
        .newsletter-section {
            background-color: rgba(208, 200, 186, 0.3);
            padding: 3rem 1rem;
            text-align: center;
        }
        
        .newsletter-section h2 {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            color: var(--color-brown);
            margin-bottom: 0.75rem;
        }
        
        .newsletter-section p {
            color: rgba(95, 67, 50, 0.8);
            margin-bottom: 1.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .newsletter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            max-width: 450px;
            margin: 0 auto;
        }
        
        .newsletter-form .form-input {
            flex: 1;
            min-width: 200px;
        }
        
        /* ============================================
           PUBLICATIONS GRID
           ============================================ */
        .publications-section {
            padding: 3rem 1rem;
        }
        
        .publications-section h2 {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            color: var(--color-brown);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .category-btn {
            padding: 0.375rem 0.875rem;
            font-size: 0.875rem;
            background-color: transparent;
            color: var(--color-brown);
            border: 1px solid var(--color-beige);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .category-btn:hover {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .category-btn.active {
            background-color: var(--color-sage);
            color: var(--color-cream);
            border-color: var(--color-sage);
        }
        
        .publications-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        
        @media (min-width: 768px) {
            .publications-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .publication-card {
            background-color: var(--color-cream);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .publication-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        
        .publication-image {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        
        .publication-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .publication-card:hover .publication-image img {
            transform: scale(1.05);
        }
        
        .publication-image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(95, 67, 50, 0.8), transparent);
        }
        
        .publication-category {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            padding: 0.25rem 0.625rem;
            background-color: var(--color-sage);
            color: var(--color-cream);
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 9999px;
        }
        
        .publication-title {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            right: 0.75rem;
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-cream);
        }
        
        .publication-content {
            padding: 1rem;
        }
        
        .publication-excerpt {
            font-size: 0.875rem;
            color: rgba(95, 67, 50, 0.8);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .publication-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--color-sage);
        }
        
        .publication-author {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        
        .publication-author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--color-beige);
            color: var(--color-brown);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            font-weight: 600;
        }
        
        .publication-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(95, 67, 50, 0.6);
        }
        
        /* ============================================
           PUBLICATION DETAIL
           ============================================ */
        .publication-detail {
            flex: 1;
        }
        
        .publication-detail-header {
            position: relative;
            height: 280px;
            overflow: hidden;
        }
        
        @media (min-width: 768px) {
            .publication-detail-header {
                height: 320px;
            }
        }
        
        .publication-detail-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .publication-detail-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, 
                rgba(95, 67, 50, 1) 0%, 
                rgba(95, 67, 50, 0.5) 50%, 
                transparent 100%
            );
        }
        
        .publication-detail-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
        }
        
        .publication-detail-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .publication-detail-content p {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--color-brown);
            margin-bottom: 1.5rem;
        }
        
        .publication-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-beige);
        }
        
        .author-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: rgba(208, 200, 186, 0.2);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .author-card-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--color-sage);
            color: var(--color-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .author-card h3 {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            color: var(--color-brown);
        }
        
        .author-card p {
            font-family: var(--font-sans);
            font-size: 0.875rem;
            color: rgba(95, 67, 50, 0.7);
            margin: 0;
        }
        
        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            background-color: var(--color-brown);
            color: var(--color-cream);
            padding: 2rem 1rem;
            margin-top: auto;
        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .footer-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .footer-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .footer-brand img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .footer-brand span {
            font-family: var(--font-serif);
            font-weight: 700;
        }
        
        .footer p {
            color: rgba(254, 253, 253, 0.7);
            font-size: 0.875rem;
        }
        
        .footer h4 {
            font-family: var(--font-serif);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .footer ul {
            list-style: none;
        }
        
        .footer li {
            margin-bottom: 0.5rem;
        }
        
        .footer button {
            color: rgba(254, 253, 253, 0.7);
            font-size: 0.875rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s ease;
        }
        
        .footer button:hover {
            color: var(--color-cream);
        }
        
        .footer-divider {
            margin: 1.5rem 0;
            border: none;
            border-top: 1px solid rgba(254, 253, 253, 0.2);
        }
        
        .footer-copyright {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(254, 253, 253, 0.6);
        }
        
        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background-color: rgba(95, 67, 50, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background-color: var(--color-cream);
            border-radius: var(--radius);
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        
        .modal-overlay.open .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-beige);
            text-align: center;
        }
        
        .modal-header h2 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            color: var(--color-brown);
        }
        
        .modal-header p {
            color: rgba(95, 67, 50, 0.7);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--color-beige);
            text-align: center;
        }
        
        .modal-footer p {
            font-size: 0.875rem;
            color: rgba(95, 67, 50, 0.7);
        }
        
        .modal-footer button {
            color: var(--color-sage);
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .modal-footer button:hover {
            text-decoration: underline;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--color-brown);
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        
        .modal-close:hover {
            opacity: 1;
        }
        
        .modal-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            background-color: rgba(208, 200, 186, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-sage);
        }
        
        /* ============================================
           ADMIN PANEL
           ============================================ */
        .admin-panel {
            background-color: var(--color-cream);
            min-height: 100vh;
        }
        
        .admin-header {
            background-color: var(--color-brown);
            color: var(--color-cream);
            padding: 1rem;
        }
        
        .admin-header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .admin-header h1 {
            font-family: var(--font-serif);
            font-size: 1.25rem;
        }
        
        .admin-nav {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--color-beige);
            background-color: var(--color-white);
        }
        
        .admin-nav-btn {
            padding: 0.875rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-brown);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .admin-nav-btn:hover {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .admin-nav-btn.active {
            color: var(--color-sage);
            border-bottom-color: var(--color-sage);
        }
        
        .admin-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        
        .admin-section {
            display: none;
        }
        
        .admin-section.active {
            display: block;
        }
        
        .admin-card {
            background-color: var(--color-white);
            border-radius: var(--radius);
            border: 1px solid var(--color-beige);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .admin-card h3 {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            color: var(--color-brown);
            margin-bottom: 1rem;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th,
        .admin-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--color-beige);
        }
        
        .admin-table th {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(95, 67, 50, 0.7);
        }
        
        .admin-table td {
            font-size: 0.875rem;
        }
        
        .admin-table-img {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }
        
        .admin-table-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .stat-card {
            background-color: var(--color-white);
            border-radius: var(--radius);
            border: 1px solid var(--color-beige);
            padding: 1.25rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-sage);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: rgba(95, 67, 50, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Logo upload section */
        .logo-upload-section {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .current-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--color-beige);
        }
        
        .logo-upload-info h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-brown);
            margin-bottom: 0.25rem;
        }
        
        .logo-upload-info p {
            font-size: 0.875rem;
            color: rgba(95, 67, 50, 0.7);
            margin-bottom: 0.75rem;
        }
        
        /* Hero image section */
        .hero-preview {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: var(--radius);
            margin-bottom: 1rem;
        }
        
        /* ============================================
           TOAST NOTIFICATIONS
           ============================================ */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .toast {
            padding: 1rem 1.25rem;
            background-color: var(--color-brown);
            color: var(--color-cream);
            border-radius: var(--radius);
            box-shadow: var(--shadow-hover);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
            max-width: 350px;
        }
        
        .toast.success {
            background-color: var(--color-success);
        }
        
        .toast.error {
            background-color: var(--color-error);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* ============================================
           LOADING SPINNER
           ============================================ */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(254, 253, 253, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .loading-content .spinner {
            width: 40px;
            height: 40px;
            border-width: 3px;
            border-top-color: var(--color-sage);
            margin: 0 auto 1rem;
        }
        
        /* ============================================
           ICONS (SVG inline)
           ============================================ */
        .icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: middle;
        }
        
        .icon-sm { font-size: 16px; }
        .icon-md { font-size: 20px; }
        .icon-lg { font-size: 24px; }
    </style>
</head>
<body>
    <!-- Toast Container -->
     <div id="toast-container" class="toast-container"></div>
    
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Cargando...</p>
        </div>
    </div>
    
    <!-- Main App Container -->
    <main id="app"></main>
    
    <!-- Script principal -->
    <script src="main.js" defer></script>
</body>
</html>
