<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Poco de aire | Textos para respirar</title>
    <meta name="description" content="Un poco de aire es un lugar para detenerse un momento. Un espacio de textos sobre la vida cotidiana.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --color-cream: #fefdfd;
            --color-beige: #d0c8ba;
            --color-sage: #85937e;
            --color-brown: #5f4332;
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', system-ui, sans-serif;
            --radius: 12px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--color-cream);
            color: var(--color-brown);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .hidden { display: none !important; }
        
        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--color-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            z-index: 9999;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-beige);
            border-top-color: var(--color-sage);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Error display */
        #error-display {
            position: fixed;
            inset: 0;
            background: var(--color-cream);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
            z-index: 9998;
        }
        
        #error-display.show { display: flex; }
        
        /* Header */
        header {
            position: sticky;
            top: 0;
            background: var(--color-cream);
            border-bottom: 1px solid var(--color-beige);
            padding: 1rem;
            z-index: 100;
        }
        
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--color-sage);
        }
        
        .logo span {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-brown);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--color-sage);
            color: var(--color-cream);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Hero */
        .hero {
            background: linear-gradient(135deg, var(--color-brown) 0%, var(--color-sage) 50%, var(--color-brown) 100%);
            padding: 4rem 1rem;
            text-align: center;
        }
        
        .hero h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--color-cream);
            margin-bottom: 1rem;
        }
        
        .hero p {
            color: rgba(254, 253, 253, 0.9);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        /* Publications */
        .publications {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }
        
        .publications h2 {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .pub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .pub-card {
            background: var(--color-cream);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(95, 67, 50, 0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .pub-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(95, 67, 50, 0.15);
        }
        
        .pub-card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }
        
        .pub-card-content {
            padding: 1rem;
        }
        
        .pub-card h3 {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            margin-bottom: 0.5rem;
        }
        
        .pub-card p {
            font-size: 0.875rem;
            opacity: 0.8;
        }
        
        /* Footer */
        footer {
            background: var(--color-brown);
            color: var(--color-cream);
            padding: 2rem 1rem;
            text-align: center;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(95, 67, 50, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 1000;
        }
        
        .modal-overlay.open { display: flex; }
        
        .modal {
            background: var(--color-cream);
            border-radius: var(--radius);
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .modal h2 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--color-beige);
            border-radius: var(--radius);
            font-size: 0.875rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--color-sage);
        }
        
        /* Mobile menu */
        .mobile-menu-btn { display: none; }
        
        @media (max-width: 768px) {
            .header-actions { display: none; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>
    
    <!-- Error Display -->
    <div id="error-display">
        <h2 style="color: var(--color-brown);">⚠️ Error al cargar</h2>
        <p id="error-message" style="color: var(--color-brown); opacity: 0.8;"></p>
        <button class="btn btn-primary" onclick="location.reload()">Reintentar</button>
    </div>
    
    <!-- App -->
    <div id="app"></div>
    
    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal">
            <h2>Iniciar sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Entrar</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem; opacity: 0.7;">
                ¿No tienes cuenta? <a href="#" onclick="showRegister()" style="color: var(--color-sage)">Regístrate</a>
            </p>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div id="register-modal" class="modal-overlay">
        <div class="modal">
            <h2>Crear cuenta</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" name="name" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="tu@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Crear cuenta</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem; opacity: 0.7;">
                ¿Ya tienes cuenta? <a href="#" onclick="showLogin()" style="color: var(--color-sage)">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN - YA CONFIGURADO POR EL USUARIO
        // ============================================
        const SUPABASE_URL = 'https://uagwapbwmgvlpbgwyuvn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhZ3dhcGJ3bWd2bHBiZ3d5dXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwOTc4MTUsImV4cCI6MjA4ODY3MzgxNX0.Fj8m1g_m02jhBSFAWYW-vdods53lN_acZ_0wOoG7TGo';
        const ADMIN_EMAIL = 'macarenavila@admin.com';
        
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let supabase = null;
        let currentUser = null;
        let isAdmin = false;
        
        let siteConfig = {
            name: 'Un Poco de aire',
            logo: '',
            heroTitle: 'Textos para respirar',
            heroSubtitle: 'Un lugar para detenerse un momento. Un espacio de textos sobre la vida cotidiana, los vínculos, las preguntas y todo eso que aparece cuando bajamos un poco el ruido.'
        };
        
        let publications = [];
        
        // ============================================
        // UTILIDADES
        // ============================================
        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-display').classList.add('show');
            document.getElementById('error-message').textContent = message;
            console.error('Error:', message);
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }
        
        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().substr(0, 2) : '?';
        }
        
        function formatDate(date) {
            return new Date(date).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
        }
        
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function init() {
            try {
                console.log('Iniciando aplicación...');
                
                // Cargar datos locales primero
                loadLocalData();
                
                // Inicializar Supabase
                if (SUPABASE_URL && SUPABASE_URL !== 'TU_SUPABASE_URL_AQUI') {
                    try {
                        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                        console.log('Supabase inicializado');
                        
                        // Verificar sesión
                        const { data: { session } } = await supabase.auth.getSession();
                        if (session) {
                            currentUser = session.user;
                            isAdmin = currentUser.email === ADMIN_EMAIL;
                            console.log('Sesión encontrada:', currentUser.email);
                        }
                        
                        // Cargar datos de Supabase (con manejo de errores)
                        await loadFromSupabase();
                        
                    } catch (e) {
                        console.warn('Error con Supabase, usando modo local:', e.message);
                        supabase = null;
                    }
                }
                
                // Si no hay publicaciones, crear datos de ejemplo
                if (publications.length === 0) {
                    publications = getDefaultPublications();
                    saveLocalData();
                }
                
                // Renderizar la app
                renderApp();
                hideLoading();
                console.log('Aplicación lista');
                
            } catch (error) {
                showError('Error al cargar la aplicación: ' + error.message);
            }
        }
        
        function getDefaultPublications() {
            return [
                {
                    id: generateId(),
                    title: 'El arte de detenerse',
                    excerpt: 'A veces la pausa es más necesaria que el movimiento.',
                    content: 'A veces la pausa es más necesaria que el movimiento.\n\nVivimos corriendo, persiguiendo metas que ni siquiera nos hemos detenido a cuestionar.',
                    author: 'María García',
                    category: 'Reflexiones',
                    image: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80',
                    date: formatDate(new Date()),
                    readTime: '3 min'
                },
                {
                    id: generateId(),
                    title: 'Palabras para el silencio',
                    excerpt: 'Hay palabras que solo pueden decirse en el silencio.',
                    content: 'Hay palabras que solo pueden decirse en el silencio.\n\nNo porque no merezcan ser escuchadas, sino porque su peso solo puede sostenerse en la quietud.',
                    author: 'Carlos Ruiz',
                    category: 'Poesía',
                    image: 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=800&q=80',
                    date: formatDate(new Date(Date.now() - 86400000)),
                    readTime: '2 min'
                }
            ];
        }
        
        function loadLocalData() {
            try {
                const savedUser = localStorage.getItem('upa_user');
                if (savedUser) {
                    currentUser = JSON.parse(savedUser);
                    isAdmin = currentUser.email === ADMIN_EMAIL;
                }
                
                const savedConfig = localStorage.getItem('upa_config');
                if (savedConfig) siteConfig = { ...siteConfig, ...JSON.parse(savedConfig) };
                
                const savedPubs = localStorage.getItem('upa_publications');
                if (savedPubs) publications = JSON.parse(savedPubs);
                
                console.log('Datos locales cargados');
            } catch (e) {
                console.warn('Error cargando datos locales:', e);
            }
        }
        
        function saveLocalData() {
            try {
                localStorage.setItem('upa_config', JSON.stringify(siteConfig));
                localStorage.setItem('upa_publications', JSON.stringify(publications));
            } catch (e) {
                console.warn('Error guardando datos:', e);
            }
        }
        
        async function loadFromSupabase() {
            if (!supabase) return;
            
            try {
                // Intentar cargar publicaciones
                const { data: pubs, error: pubsError } = await supabase
                    .from('publications')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (pubs && !pubsError) {
                    publications = pubs;
                    console.log('Publicaciones cargadas de Supabase:', publications.length);
                }
                
                // Intentar cargar configuración
                const { data: config, error: configError } = await supabase
                    .from('site_config')
                    .select('*')
                    .single();
                
                if (config && !configError) {
                    siteConfig = { ...siteConfig, ...config };
                }
                
            } catch (e) {
                console.warn('Error cargando de Supabase:', e.message);
            }
        }
        
        // ============================================
        // AUTENTICACIÓN
        // ============================================
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const email = form.email.value;
            const password = form.password.value;
            
            try {
                if (supabase) {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    currentUser = data.user;
                } else {
                    currentUser = { id: generateId(), email, user_metadata: { name: email.split('@')[0] } };
                    localStorage.setItem('upa_user', JSON.stringify(currentUser));
                }
                
                isAdmin = email === ADMIN_EMAIL;
                closeModal('login-modal');
                renderApp();
                alert('¡Bienvenido!');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const name = form.name.value;
            const email = form.email.value;
            const password = form.password.value;
            
            try {
                if (supabase) {
                    const { data, error } = await supabase.auth.signUp({
                        email,
                        password,
                        options: { data: { name } }
                    });
                    if (error) throw error;
                    alert('¡Revisa tu email para confirmar tu cuenta!');
                } else {
                    currentUser = { id: generateId(), email, user_metadata: { name } };
                    localStorage.setItem('upa_user', JSON.stringify(currentUser));
                    isAdmin = email === ADMIN_EMAIL;
                    closeModal('register-modal');
                    renderApp();
                    alert('¡Cuenta creada!');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function handleLogout() {
            if (supabase) {
                await supabase.auth.signOut();
            }
            currentUser = null;
            isAdmin = false;
            localStorage.removeItem('upa_user');
            renderApp();
        }
        
        // ============================================
        // RENDER
        // ============================================
        function renderApp() {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <header>
                    <div class="header-inner">
                        <button class="logo" onclick="goHome()">
                            <img src="${siteConfig.logo || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%2385937e%22/><text x=%2250%22 y=%2260%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22>U</text></svg>'}" alt="Logo">
                            <span>${siteConfig.name}</span>
                        </button>
                        
                        <div class="header-actions">
                            ${currentUser ? `
                                <span style="font-size: 0.875rem;">${currentUser.user_metadata?.name || currentUser.email}</span>
                                ${isAdmin ? '<button class="btn btn-outline" onclick="location.href=\'?admin=1\'">Admin</button>' : ''}
                                <button class="btn btn-outline" onclick="handleLogout()">Salir</button>
                            ` : `
                                <button class="btn btn-outline" onclick="showLogin()">Entrar</button>
                                <button class="btn btn-primary" onclick="showRegister()">Registrarse</button>
                            `}
                        </div>
                        
                        <button class="mobile-menu-btn btn btn-outline" onclick="toggleMobileMenu()">☰</button>
                    </div>
                </header>
                
                <section class="hero">
                    <h1>${siteConfig.heroTitle}</h1>
                    <p>${siteConfig.heroSubtitle}</p>
                    <button class="btn" style="background: var(--color-cream); color: var(--color-brown);">📧 Newsletter</button>
                </section>
                
                <section class="publications">
                    <h2>Publicaciones recientes</h2>
                    <div class="pub-grid">
                        ${publications.map(pub => `
                            <article class="pub-card" onclick="viewPublication('${pub.id}')">
                                <img src="${pub.image}" alt="${pub.title}">
                                <div class="pub-card-content">
                                    <h3>${pub.title}</h3>
                                    <p>${pub.excerpt}</p>
                                </div>
                            </article>
                        `).join('')}
                    </div>
                </section>
                
                <footer>
                    <p>© ${new Date().getFullYear()} ${siteConfig.name}</p>
                </footer>
            `;
        }
        
        // ============================================
        // FUNCIONES DE UI
        // ============================================
        function showLogin() {
            document.getElementById('login-modal').classList.add('open');
        }
        
        function showRegister() {
            closeModal('login-modal');
            document.getElementById('register-modal').classList.add('open');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }
        
        function goHome() {
            window.location.href = window.location.pathname;
        }
        
        function toggleMobileMenu() {
            alert('Menú móvil - en desarrollo');
        }
        
        function viewPublication(id) {
            const pub = publications.find(p => p.id === id);
            if (!pub) return;
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <header>
                    <div class="header-inner">
                        <button class="logo" onclick="init(); renderApp();">
                            <span>← Volver</span>
                        </button>
                    </div>
                </header>
                
                <article style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
                    <img src="${pub.image}" alt="${pub.title}" style="width: 100%; border-radius: var(--radius); margin-bottom: 1.5rem;">
                    <h1 style="font-family: var(--font-serif); font-size: 2rem; margin-bottom: 1rem;">${pub.title}</h1>
                    <p style="opacity: 0.7; margin-bottom: 2rem;">${pub.author} · ${pub.date} · ${pub.readTime}</p>
                    <div style="font-family: var(--font-serif); font-size: 1.125rem; line-height: 1.8;">
                        ${pub.content.split('\n\n').map(p => `<p style="margin-bottom: 1.5rem;">${p}</p>`).join('')}
                    </div>
                </article>
            `;
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('login-form').addEventListener('submit', handleLogin);
        document.getElementById('register-form').addEventListener('submit', handleRegister);
        
        // Cerrar modales al hacer clic fuera
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('open');
                }
            });
        });
        
        // Verificar si estamos en modo admin
        if (window.location.search.includes('admin=1')) {
            // Cargar panel admin después de init
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => {
                    if (isAdmin) {
                        loadAdminPanel();
                    } else {
                        alert('No tienes permisos de administrador');
                        window.location.href = window.location.pathname;
                    }
                }, 500);
            });
        }
        
        function loadAdminPanel() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <header style="background: var(--color-brown); color: var(--color-cream);">
                    <div class="header-inner">
                        <h1 style="font-family: var(--font-serif);">Panel de Administración</h1>
                        <button class="btn" style="background: var(--color-cream); color: var(--color-brown);" onclick="goHome()">Volver</button>
                    </div>
                </header>
                
                <div style="max-width: 1200px; margin: 0 auto; padding: 2rem 1rem;">
                    <div style="background: white; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--color-beige);">
                        <h2 style="font-family: var(--font-serif); margin-bottom: 1rem;">Publicaciones (${publications.length})</h2>
                        <button class="btn btn-primary" onclick="alert('Función en desarrollo')">+ Nueva publicación</button>
                        
                        ${publications.length > 0 ? `
                            <table style="width: 100%; margin-top: 1rem; border-collapse: collapse;">
                                <thead>
                                    <tr style="border-bottom: 1px solid var(--color-beige);">
                                        <th style="text-align: left; padding: 0.5rem;">Título</th>
                                        <th style="text-align: left; padding: 0.5rem;">Autor</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${publications.map(p => `
                                        <tr style="border-bottom: 1px solid var(--color-beige);">
                                            <td style="padding: 0.5rem;">${p.title}</td>
                                            <td style="padding: 0.5rem;">${p.author}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : '<p style="margin-top: 1rem; opacity: 0.6;">No hay publicaciones</p>'}
                    </div>
                </div>
            `;
        }
        
        // Iniciar aplicación
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
