<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Poco de aire | Textos para respirar</title>
    <meta name="description" content="Un poco de aire es un lugar para detenerse un momento. Un espacio de textos sobre la vida cotidiana,los vinculos,las preguntas y todo eso que aparece cuando bajamos un poco el ruido.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ============================================
           VARIABLES Y RESET
           ============================================ */
        :root {
            --color-cream: #fefdfd;
            --color-beige: #d0c8ba;
            --color-sage: #85937e;
            --color-brown: #5f4332;
            --color-white: #ffffff;
            --color-error: #c45c4a;
            --color-success: #4a8c5c;
            
            --font-serif: 'Playfair Display', Georgia, serif;
            --font-sans: 'Inter', system-ui, sans-serif;
            
            --radius: 12px;
            --shadow: 0 4px 20px rgba(95, 67, 50, 0.1);
            --shadow-hover: 0 8px 30px rgba(95, 67, 50, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--color-cream);
            color: var(--color-brown);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ============================================
           UTILIDADES
           ============================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .flex-wrap { flex-wrap: wrap; }
        
        .font-serif { font-family: var(--font-serif); }
        .font-bold { font-weight: 700; }
        .font-semibold { font-weight: 600; }
        
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 2rem; }
        .text-4xl { font-size: 2.5rem; }
        
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mb-8 { margin-bottom: 2rem; }
        .mt-4 { margin-top: 1rem; }
        .mt-6 { margin-top: 1.5rem; }
        .mt-auto { margin-top: auto; }
        
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
        .py-12 { padding-top: 3rem; padding-bottom: 3rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        
        .rounded { border-radius: var(--radius); }
        .rounded-full { border-radius: 9999px; }
        
        /* ============================================
           BOTONES
           ============================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background-color: var(--color-sage);
            color: var(--color-cream);
            border-color: var(--color-sage);
        }
        
        .btn-primary:hover:not(:disabled) {
            background-color: #75836e;
        }
        
        .btn-secondary {
            background-color: var(--color-cream);
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background-color: var(--color-beige);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--color-brown);
            border-color: var(--color-beige);
        }
        
        .btn-outline:hover:not(:disabled) {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .btn-ghost {
            background-color: transparent;
            color: var(--color-brown);
            border-color: transparent;
        }
        
        .btn-ghost:hover:not(:disabled) {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }
        
        .btn-lg {
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
        }
        
        .btn-icon {
            padding: 0.5rem;
            width: 36px;
            height: 36px;
        }
        
        .btn-error {
            background-color: var(--color-error);
            color: white;
            border-color: var(--color-error);
        }
        
        /* ============================================
           FORMULARIOS
           ============================================ */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-brown);
        }
        
        .form-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            color: var(--color-brown);
            background-color: var(--color-cream);
            border: 1px solid var(--color-beige);
            border-radius: var(--radius);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-sage);
            box-shadow: 0 0 0 3px rgba(133, 147, 126, 0.2);
        }
        
        .form-input::placeholder {
            color: rgba(95, 67, 50, 0.5);
        }
        
        textarea.form-input {
            min-height: 120px;
            resize: vertical;
        }
        
        select.form-input {
            cursor: pointer;
        }
        
        .form-helper {
            margin-top: 0.25rem;
            font-size: 0.75rem;
            color: rgba(95, 67, 50, 0.6);
        }
        
        /* File input personalizado */
        .file-input-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .file-input {
            display: none;
        }
        
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border: 2px dashed var(--color-beige);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .file-input-label:hover {
            border-color: var(--color-sage);
            background-color: rgba(133, 147, 126, 0.05);
        }
        
        .file-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: var(--radius);
            object-fit: cover;
        }
        
        /* ============================================
           HEADER
           ============================================ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--color-cream);
            border-bottom: 1px solid var(--color-beige);
            box-shadow: 0 2px 10px rgba(95, 67, 50, 0.05);
        }
        
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            text-decoration: none;
        }
        
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--color-sage);
        }
        
        .logo-text {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-brown);
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .search-wrapper {
            position: relative;
        }
        
        .search-input {
            padding-left: 2.25rem;
            width: 180px;
        }
        
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--color-sage);
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--color-sage);
            color: var(--color-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .mobile-menu-btn {
            display: none;
        }
        
        /* Mobile menu */
        @media (max-width: 768px) {
            .header-actions.desktop {
                display: none;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
            
            .mobile-menu {
                display: none;
                padding: 1rem;
                border-top: 1px solid var(--color-beige);
            }
            
            .mobile-menu.open {
                display: block;
            }
            
            .mobile-menu .form-input,
            .mobile-menu .btn {
                width: 100%;
            }
            
            .mobile-menu .user-menu {
                flex-direction: column;
                align-items: stretch;
            }
        }
        
        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            position: relative;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        
        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(95, 67, 50, 0.9) 0%, 
                rgba(133, 147, 126, 0.8) 50%, 
                rgba(95, 67, 50, 0.7) 100%
            );
        }
        
        .hero-content {
            position: relative;
            z-index: 10;
            padding: 4rem 1rem;
            text-align: center;
        }
        
        .hero-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background-color: rgba(254, 253, 253, 0.2);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-logo img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .hero h1 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-cream);
            margin-bottom: 1rem;
        }
        
        .hero p {
            font-size: 1.125rem;
            color: rgba(254, 253, 253, 0.9);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        
        .hero-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
        }
        
        .hero-wave svg {
            display: block;
            width: 100%;
            height: auto;
        }
        
        @media (min-width: 768px) {
            .hero-content {
                padding: 6rem 1rem;
            }
            
            .hero h1 {
                font-size: 3rem;
            }
            
            .hero p {
                font-size: 1.25rem;
            }
        }
        
        /* ============================================
           NEWSLETTER SECTION
           ============================================ */
        .newsletter-section {
            background-color: rgba(208, 200, 186, 0.3);
            padding: 3rem 1rem;
            text-align: center;
        }
        
        .newsletter-section h2 {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            color: var(--color-brown);
            margin-bottom: 0.75rem;
        }
        
        .newsletter-section p {
            color: rgba(95, 67, 50, 0.8);
            margin-bottom: 1.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .newsletter-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            max-width: 450px;
            margin: 0 auto;
        }
        
        .newsletter-form .form-input {
            flex: 1;
            min-width: 200px;
        }
        
        /* ============================================
           PUBLICATIONS GRID
           ============================================ */
        .publications-section {
            padding: 3rem 1rem;
        }
        
        .publications-section h2 {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            color: var(--color-brown);
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .category-btn {
            padding: 0.375rem 0.875rem;
            font-size: 0.875rem;
            background-color: transparent;
            color: var(--color-brown);
            border: 1px solid var(--color-beige);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .category-btn:hover {
            background-color: rgba(208, 200, 186, 0.2);
        }
        
        .category-btn.active {
            background-color: var(--color-sage);
            color: var(--color-cream);
            border-color: var(--color-sage);
        }
        
        .publications-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        
        @media (min-width: 768px) {
            .publications-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .publication-card {
            background-color: var(--color-cream);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .publication-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        
        .publication-image {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
        }
        
        .publication-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .publication-card:hover .publication-image img {
            transform: scale(1.05);
        }
        
        .publication-image-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(95, 67, 50, 0.8), transparent);
        }
        
        .publication-category {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            padding: 0.25rem 0.625rem;
            background-color: var(--color-sage);
            color: var(--color-cream);
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 9999px;
        }
        
        .publication-title {
            position: absolute;
            bottom: 0.75rem;
            left: 0.75rem;
            right: 0.75rem;
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--color-cream);
        }
        
        .publication-content {
            padding: 1rem;
        }
        
        .publication-excerpt {
            font-size: 0.875rem;
            color: rgba(95, 67, 50, 0.8);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .publication-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--color-sage);
        }
        
        .publication-author {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }
        
        .publication-author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--color-beige);
            color: var(--color-brown);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.625rem;
            font-weight: 600;
        }
        
        .publication-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(95, 67, 50, 0.6);
        }
        
        /* ============================================
           PUBLICATION DETAIL
           ============================================ */
        .publication-detail {
            flex: 1;
        }
        
        .publication-detail-header {
            position: relative;
            height: 280px;
            overflow: hidden;
        }
        
        @media (min-width: 768px) {
            .publication-detail-header {
                height: 320px;
            }
        }
        
        .publication-detail-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .publication-detail-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, 
                rgba(95, 67, 50, 1) 0%, 
                rgba(95, 67, 50, 0.5) 50%, 
                transparent 100%
            );
        }
        
        .publication-detail-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
        }
        
        .publication-detail-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .publication-detail-content p {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            line-height: 1.8;
            color: var(--color-brown);
            margin-bottom: 1.5rem;
        }
        
        .publication-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--color-beige);
        }
        
        .author-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: rgba(208, 200, 186, 0.2);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .author-card-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--color-sage);
            color: var(--color-cream);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .author-card h3 {
            font-family: var(--font-serif);
            font-size: 1.125rem;
            color: var(--color-brown);
        }
        
        .author-card p {
            font-family: var(--font-sans);
            font-size: 0.875rem;
            color: rgba(95, 67, 50, 0.7);
            margin: 0;
        }
        
        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            background-color: var(--color-brown);
            color: var(--color-cream);
            padding: 2rem 1rem;
            margin-top: auto;
        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .footer-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .footer-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .footer-brand img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .footer-brand span {
            font-family: var(--font-serif);
            font-weight: 700;
        }
        
        .footer p {
            color: rgba(254, 253, 253, 0.7);
            font-size: 0.875rem;
        }
        
        .footer h4 {
            font-family: var(--font-serif);
            font-weight: 700;
            margin-bottom: 1rem;
        }
        
        .footer ul {
            list-style: none;
        }
        
        .footer li {
            margin-bottom: 0.5rem;
        }
        
        .footer button {
            color: rgba(254, 253, 253, 0.7);
            font-size: 0.875rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s ease;
        }
        
        .footer button:hover {
            color: var(--color-cream);
        }
        
        .footer-divider {
            margin: 1.5rem 0;
            border: none;
            border-top: 1px solid rgba(254, 253, 253, 0.2);
        }
        
        .footer-copyright {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(254, 253, 253, 0.6);
        }
        
        /* ============================================
           MODAL
           ============================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background-color: rgba(95, 67, 50, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background-color: var(--color-cream);
            border-radius: var(--radius);
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        
        .modal-overlay.open .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-beige);
            text-align: center;
        }

        async function signIn(email, password) {
            if (!supabase) {
                // Modo local
                const user = {
                    id: generateId(),
                    email: email,
                    user_metadata: { name: email.split('@')[0] }
                };
                currentUser = user;
                isAdmin = email === ADMIN_EMAIL;
                storage.set('currentUser', currentUser);
                showToast('¡Bienvenido!', 'success');
                renderApp();
                return { success: true };
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                currentUser = data.user;
                isAdmin = currentUser.email === ADMIN_EMAIL;
                showToast('¡Bienvenido!', 'success');
                closeModal();
                renderApp();
                return { success: true, data };
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
                return { success: false, error };

        // ============================================
        // GESTIÓN DE PUBLICACIONES
        // ============================================
        async function loadPublications() {
            if (!supabase) return;
            
            try {
                const { data, error } = await supabase
                    .from('publications')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                if (data) publications = data;
            } catch (error) {
                console.error('Error cargando publicaciones:', error);
            }
        }
        
        async function savePublication(pub) {
            const isNew = !pub.id;
            const publication = {
                ...pub,
                id: pub.id || generateId(),
                created_at: pub.created_at || new Date().toISOString(),
                updated_at: new Date().toISOString()
            };
            
            if (!supabase) {
                if (isNew) {
                    publications.unshift(publication);
                } else {
                    const index = publications.findIndex(p => p.id === pub.id);
                    if (index >= 0) publications[index] = publication;
                }
                saveLocalData();
                return publication;
            }
            
            try {
                const { data, error } = await supabase
                    .from('publications')
                    .upsert(publication)
                    .select()
                    .single();
                
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Error guardando publicación:', error);
                throw error;
            }
        }
        
        async function deletePublication(id) {
            if (!supabase) {
                publications = publications.filter(p => p.id !== id);
                saveLocalData();
                return true;
            }
            
            try {
                const { error } = await supabase
                    .from('publications')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                return true;
            } catch (error) {
                console.error('Error eliminando publicación:', error);
                throw error;
            }
        }

        // ============================================
        // CONVERSIÓN DE IMÁGENES A BASE64
        // ============================================
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

                <div class="publication-detail">
                    <div class="publication-detail-header">
                        <img src="${pub.image || 'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800&q=80'}" alt="${escapeHtml(pub.title)}">
                        <div class="publication-detail-overlay"></div>
                        <div class="publication-detail-info">
                            <button class="btn btn-ghost" style="color: var(--color-cream); margin-bottom: 1rem;" onclick="navigateHome()">
                                ${icon('arrowLeft')} Volver
                            </button>
                            <span class="publication-category" style="position: static; margin-bottom: 0.5rem;">${pub.category}</span>
                            <h1 style="font-family: var(--font-serif); font-size: 2rem; color: var(--color-cream); margin-bottom: 0.5rem;">
                                ${escapeHtml(pub.title)}
                            </h1>
                            <div class="flex items-center gap-4" style="color: rgba(254, 253, 253, 0.8); font-size: 0.875rem;">
                                <div class="flex items-center gap-2">
                                    <div class="user-avatar">${getInitials(pub.author)}</div>
                                    <span>${escapeHtml(pub.author)}</span>
                                </div>
                                <span>${icon('calendar', 'icon-sm')} ${pub.date}</span>
                                <span>${icon('clock', 'icon-sm')} ${pub.readTime}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="publication-detail-content">
                        ${paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join('')}
                        
                        <div class="publication-actions">
                            <button class="btn btn-outline">${icon('heart')} Me gusta</button>
                            <button class="btn btn-outline">${icon('bookmark')} Guardar</button>
                            <button class="btn btn-outline">${icon('share')} Compartir</button>
                        </div>
                        
                        <div class="author-card">
                            <div class="author-card-avatar">${getInitials(pub.author)}</div>
                            <div>
                                <h3>${escapeHtml(pub.author)}</h3>
                                <p>Escritor y colaborador de ${siteConfig.name}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Renderizar Footer
        function renderFooter() {
            return `
                <footer class="footer">
                    <div class="footer-grid">
                        <div>
                            <div class="footer-brand">
                                <img src="${siteConfig.logo}" alt="Logo">
                                <span>${siteConfig.name}</span>
                            </div>
                            <p>${siteConfig.footerText}</p>
                        </div>
                        <div>
                            <h4>Explorar</h4>
                            <ul>
                                <li><button onclick="filterCategory('Reflexiones'); navigateHome();">Reflexiones</button></li>
                                <li><button onclick="filterCategory('Poesía'); navigateHome();">Poesía</button></li>
                                <li><button onclick="filterCategory('Ensayos'); navigateHome();">Ensayos</button></li>
                                <li><button onclick="filterCategory('Naturaleza'); navigateHome();">Naturaleza</button></li>
                            </ul>
                        </div>
                        <div>
                            <h4>Newsletter</h4>
                            <p>No te pierdas ninguna publicación.</p>
                            <button class="btn btn-outline" style="border-color: var(--color-cream); color: var(--color-cream); margin-top: 0.5rem;" onclick="showNewsletterModal()">
                                Suscribirse
                            </button>
                        </div>
                    </div>
                    <hr class="footer-divider">
                    <p class="footer-copyright">© ${new Date().getFullYear()} ${siteConfig.name}. Todos los derechos reservados.</p>
                </footer>
            `;
        }
        
        // ============================================
        // PANEL DE ADMINISTRACIÓN
        // ============================================
        function renderAdminPanel() {
            return `
                <div class="admin-panel">
                    <div class="admin-header">
                        <div class="admin-header-inner">
                            <h1>${icon('settings')} Panel de Administración</h1>
                            <button class="btn btn-secondary" onclick="navigateHome()">
                                ${icon('arrowLeft')} Volver al sitio
                            </button>
                        </div>
                    </div>
                    
                    <nav class="admin-nav">
                        <button class="admin-nav-btn ${adminTab === 'publications' ? 'active' : ''}" onclick="setAdminTab('publications')">
                            Publicaciones
                        </button>
                        <button class="admin-nav-btn ${adminTab === 'site' ? 'active' : ''}" onclick="setAdminTab('site')">
                            Configuración del Sitio
                        </button>
                        <button class="admin-nav-btn ${adminTab === 'newsletter' ? 'active' : ''}" onclick="setAdminTab('newsletter')">
                            Newsletter
                        </button>
                    </nav>
                    
                    <div class="admin-content">
                        ${adminTab === 'publications' ? renderAdminPublications() : ''}
                        ${adminTab === 'site' ? renderAdminSite() : ''}
                        ${adminTab === 'newsletter' ? renderAdminNewsletter() : ''}
                    </div>
                </div>
            `;
        }
        
        function renderAdminPublications() {
            return `
                <div class="admin-card">
                    <div class="flex justify-between items-center mb-4">
                        <h3>Publicaciones (${publications.length})</h3>
                        <button class="btn btn-primary" onclick="showPublicationModal()">
                            ${icon('plus')} Nueva publicación
                        </button>
                    </div>
                    
                    ${publications.length > 0 ? `
                        <div style="overflow-x: auto;">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Imagen</th>
                                        <th>Título</th>
                                        <th>Categoría</th>
                                        <th>Autor</th>
                                        <th>Fecha</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${publications.map(pub => `
                                        <tr>
                                            <td><img src="${pub.image}" class="admin-table-img" alt=""></td>
                                            <td>${escapeHtml(pub.title)}</td>
                                            <td>${pub.category}</td>
                                            <td>${escapeHtml(pub.author)}</td>
                                            <td>${pub.date}</td>
                                            <td>
                                                <div class="admin-table-actions">
                                                    <button class="btn btn-outline btn-sm" onclick="showPublicationModal(publications.find(p => p.id === '${pub.id}'))">
                                                        ${icon('edit')}
                                                    </button>
                                                    <button class="btn btn-error btn-sm" onclick="showDeleteConfirmation('${pub.id}')">
                                                        ${icon('trash')}
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : `
                        <div class="empty-state">
                            <p>No hay publicaciones. ¡Crea la primera!</p>
                        </div>
                    `}
                </div>
            `;
        }
        
        function renderAdminSite() {
            return `
                <div class="admin-card">
                    <h3>Logo del sitio</h3>
                    <div class="logo-upload-section">
                        <img src="${siteConfig.logo}" alt="Logo actual" class="current-logo">
                        <div class="logo-upload-info">
                            <h4>Logo actual</h4>
                            <p>Recomendado: imagen cuadrada de al menos 200x200px</p>
                            <div class="file-input-wrapper">
                                <input type="file" class="file-input" id="logo-input" accept="image/*" onchange="handleLogoUpload(event)">
                                <label for="logo-input" class="btn btn-primary">
                                    ${icon('upload')} Subir nuevo logo
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="admin-card">
                    <h3>Imagen Hero</h3>
                    ${siteConfig.heroImage ? `
                        <img src="${siteConfig.heroImage}" alt="Hero actual" class="hero-preview">
                    ` : ''}
                    <div class="file-input-wrapper">
                        <input type="file" class="file-input" id="hero-input" accept="image/*" onchange="handleHeroUpload(event)">
                        <label for="hero-input" class="file-input-label">
                            ${icon('image', 'icon-md')}
                            <span>Click para subir imagen hero</span>
                        </label>
                    </div>
                </div>
                
                <div class="admin-card">
                    <h3>Textos del sitio</h3>
                    <form onsubmit="handleSiteTextsSubmit(event)">
                        <div class="form-group">
                            <label class="form-label">Nombre del sitio</label>
                            <input type="text" class="form-input" name="name" value="${escapeHtml(siteConfig.name)}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Título hero</label>
                            <input type="text" class="form-input" name="heroTitle" value="${escapeHtml(siteConfig.heroTitle)}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Subtítulo hero</label>
                            <textarea class="form-input" name="heroSubtitle" rows="2">${escapeHtml(siteConfig.heroSubtitle)}</textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Texto del footer</label>
                            <textarea class="form-input" name="footerText" rows="2">${escapeHtml(siteConfig.footerText)}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            ${icon('save')} Guardar cambios
                        </button>
                    </form>
                </div>
            `;
        }
        
        function renderAdminNewsletter() {
            return `
                <div class="admin-card">
                    <h3>Suscriptores del Newsletter (${newsletterEmails.length})</h3>
                    
                    <div class="stats-grid mb-6">
                        <div class="stat-card">
                            <div class="stat-value">${newsletterEmails.length}</div>
                            <div class="stat-label">Total suscriptores</div>
                        </div>
                    </div>
                    
                    ${newsletterEmails.length > 0 ? `
                        <div style="overflow-x: auto;">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Email</th>
                                        <th>Fecha</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${newsletterEmails.map(email => `
                                        <tr>
                                            <td>${escapeHtml(email)}</td>
                                            <td>-</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : `
                        <div class="empty-state">
                            <p>No hay suscriptores aún.</p>
                        </div>
                    `}
                </div>
            `;
        }
        
        // ============================================
        // FUNCIONES DE NAVEGACIÓN Y EVENTOS
        // ============================================
        function renderApp() {
            const app = $('#app');
            
            if (currentView === 'admin' && isAdmin) {
                app.innerHTML = renderAdminPanel();
            } else if (currentView === 'publication' && selectedPublication) {
                app.innerHTML = `
                    ${renderHeader()}
                    <main class="flex-1">
                        ${renderPublicationDetail(selectedPublication)}
                    </main>
                `;
            } else {
                app.innerHTML = `
                    ${renderHeader()}
                    <main class="flex-1">
                        ${renderHero()}
                        ${renderNewsletterSection()}
                        ${renderPublications()}
                    </main>
                    ${renderFooter()}
                `;
            }
        }
        
        function navigateHome() {
            currentView = 'home';
            selectedPublication = null;
            renderApp();
            window.scrollTo(0, 0);
        }
        
        function navigateAdmin() {
            currentView = 'admin';
            adminTab = 'publications';
            renderApp();
            window.scrollTo(0, 0);
        }
        
        function viewPublication(id) {
            selectedPublication = publications.find(p => p.id === id);
            if (selectedPublication) {
                currentView = 'publication';
                renderApp();
                window.scrollTo(0, 0);
            }
        }
        
        function filterCategory(category) {
            selectedCategory = category;
            renderApp();
        }
        
        function setAdminTab(tab) {
            adminTab = tab;
            renderApp();
        }
        
        function handleSearch(event) {
            searchQuery = event.target.value;
            if (event.key === 'Enter' || event.type === 'input') {
                renderApp();
            }
        }
        
        function scrollToPublications() {
            const section = $('#publications');
            if (section) {
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        function toggleMobileMenu() {
            const menu = $('#mobile-menu');
            if (menu) {
                menu.classList.toggle('open');
            }
        }
        
        async function handleNewsletterSubmit(event) {
            event.preventDefault();
            const email = event.target.querySelector('input[type="email"]').value;
            
            try {
                await subscribeNewsletter(email);
                showToast('¡Gracias por suscribirte!', 'success');
                event.target.reset();
            } catch (error) {
                showToast('Error al suscribir', 'error');
            }
        }
        
        async function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const base64 = await fileToBase64(file);
                siteConfig.logo = base64;
                saveLocalData();
                showToast('Logo actualizado', 'success');
                renderApp();
            }
        }
        
        async function handleHeroUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const base64 = await fileToBase64(file);
                siteConfig.heroImage = base64;
                saveLocalData();
                showToast('Imagen hero actualizada', 'success');
                renderApp();
            }
        }
        
        async function handleSiteTextsSubmit(event) {
            event.preventDefault();
            const form = event.target;
            
            siteConfig.name = form.name.value;
            siteConfig.heroTitle = form.heroTitle.value;
            siteConfig.heroSubtitle = form.heroSubtitle.value;
            siteConfig.footerText = form.footerText.value;
            
            saveLocalData();
            showToast('Configuración guardada', 'success');
            renderApp();
        }
        
        // ============================================
        // INICIALIZACIÓN DE LA APLICACIÓN
        // ============================================
        async function init() {
            showLoading(true);
            
            // Inicializar Supabase o cargar datos locales
            await initSupabase();
            
            // Cargar datos
            if (supabase) {
                await loadSiteConfig();
                await loadPublications();
            }
            
            // Si no hay publicaciones, crear datos de ejemplo
            if (publications.length === 0) {
                publications = [
                    {
                        id: generateId(),
                        title: 'El arte de la contemplación',
                        excerpt: 'En la quietud del atardecer, cuando los pensamientos se vuelven susurros, descubrimos que la verdadera sabiduría habita en los silencios.',
                        content: 'En la quietud del atardecer, cuando los pensamientos se vuelven susurros, descubrimos que la verdadera sabiduría habita en los silencios.\n\nLa contemplación no es simplemente pensar, es permitir que el pensamiento se disuelva en la experiencia pura de existir. Es en esos momentos de calma absoluta donde las grandes verdades se revelan, no como conceptos, sino como vivencias.\n\nCuando contemplamos una flor, no la analizamos. La dejamos ser, y en ese dejar ser, nosotros también somos. Esta es la paradoja más hermosa de la existencia: que al perder el ego en la admiración de algo exterior, nos encontramos más plenamente que nunca.',
                        author: 'María Elena Vargas',
                        category: 'Reflexiones',
                        image: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80',
                        date: formatDate(new Date()),
                        readTime: '5 min'
                    },
                    {
                        id: generateId(),
                        title: 'Palabras que sanan',
                        excerpt: 'Hay frases que llegan en el momento exacto, como si el universo conspirara para ofrecernos exactamente lo que necesitamos escuchar.',
                        content: 'Hay frases que llegan en el momento exacto, como si el universo conspirara para ofrecernos exactamente lo que necesitamos escuchar.\n\nLa poesía tiene este poder misterioso: puede transformar el dolor en belleza, la confusión en claridad, la soledad en conexión. No porque resuelva nuestros problemas, sino porque nos recuerda que somos más grandes que ellos.\n\nRecuerdo la primera vez que leí a Rilke: "Si tu vida cotidiana te parece pobre, no la culpes; culpaste a ti mismo porque no eres poeta para sacar su riqueza". Esas palabras me atravesaron como una flecha.',
                        author: 'Carlos Mendoza',
                        category: 'Poesía',
                        image: 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=800&q=80',
                        date: formatDate(new Date(Date.now() - 86400000)),
                        readTime: '4 min'
                    },
                    {
                        id: generateId(),
                        title: 'El jardín de los libros',
                        excerpt: 'Cada libro es una semilla que plantamos en nuestra mente. Algunos germinan de inmediato, otros esperan años bajo la tierra de nuestra memoria.',
                        content: 'Cada libro es una semilla que plantamos en nuestra mente. Algunos germinan de inmediato, otros esperan años bajo la tierra de nuestra memoria.\n\nHay libros que cambian vidas. No es una exageración ni una frase hecha. Es una verdad que cualquiera que haya amado la lectura puede confirmar. Ese momento en que las páginas dejan de ser papel y tinta para convertirse en espejos, ventanas, puentes.\n\nMi abuela tenía una biblioteca que parecía un bosque encantado. Los libros apilados hasta el techo, el olor a papel viejo y tiempo, la luz que entraba por las ventanas y pintaba de oro los lomos gastados.',
                        author: 'Ana Lucía Fernández',
                        category: 'Ensayos',
                        image: 'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800&q=80',
                        date: formatDate(new Date(Date.now() - 172800000)),
                        readTime: '6 min'
                    }
                ];
                saveLocalData();
            }
            
            showLoading(false);
            renderApp();
        }
        
        // Hacer funciones disponibles globalmente
        window.navigateHome = navigateHome;
        window.navigateAdmin = navigateAdmin;
        window.viewPublication = viewPublication;
        window.filterCategory = filterCategory;
        window.setAdminTab = setAdminTab;
        window.handleSearch = handleSearch;
        window.showLoginModal = showLoginModal;
        window.showRegisterModal = showRegisterModal;
        window.showNewsletterModal = showNewsletterModal;
        window.showPublicationModal = showPublicationModal;
        window.showDeleteConfirmation = showDeleteConfirmation;
        window.confirmDelete = confirmDelete;
        window.closeModal = closeModal;
        window.signOut = signOut;
        window.toggleMobileMenu = toggleMobileMenu;
        window.handleNewsletterSubmit = handleNewsletterSubmit;
        window.handleLogoUpload = handleLogoUpload;
        window.handleHeroUpload = handleHeroUpload;
        window.handleSiteTextsSubmit = handleSiteTextsSubmit;
        window.scrollToPublications = scrollToPublications;
        window.publications = publications;
        
        // Iniciar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
